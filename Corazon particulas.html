<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Edward-Night ✨ Heart Particle V2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #0a0f1e;
      font-family: "Arial", sans-serif;
    }
    #controls-container {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
    }
    #toggle-controls, #toggle-fullscreen {
      background: linear-gradient(135deg, #1e1b4b, #0f172a);
      color: #e0f2fe;
      border: 1px solid #60a5fa;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
      margin-bottom: 5px;
      backdrop-filter: blur(5px);
      transition: all 0.3s ease;
    }
    #toggle-controls:hover, #toggle-fullscreen:hover {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      transform: scale(1.02);
    }
    #toggle-fullscreen {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
    }
    #controls {
      background: rgba(15, 23, 42, 0.8);
      padding: 15px;
      border-radius: 10px;
      backdrop-filter: blur(5px);
      border: 1px solid #60a5fa;
    }
    .control-group {
      margin: 10px 0;
      display: flex;
      align-items: center;
      color: #e0f2fe;
    }
    .control-group label {
      width: 100px;
    }
    .control-group input[type="range"], .control-group select {
      flex-grow: 1;
      margin-left: 10px;
      accent-color: #8b5cf6;
    }
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }

    /* CRÉDITO EDWARD-NIGHT */
    .credit {
      position: fixed;
      bottom: 15px;
      right: 18px;
      font-size: 11px;
      background: rgba(0,0,0,0.5);
      padding: 5px 12px;
      border-radius: 30px;
      backdrop-filter: blur(5px);
      color: #94a3b8;
      z-index: 200;
      font-family: monospace;
      letter-spacing: 0.8px;
    }
    .credit span {
      color: #60a5fa;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="controls-container">
    <button id="toggle-controls">✨ Controls ✨</button>
    <button id="toggle-fullscreen">💙 Full Screen 💙</button>
    <div id="controls">
      <div class="control-group">
        <label for="particleCount">💜 Particles:</label>
        <input type="range" id="particleCount" min="10" max="300" value="100" />
      </div>
      <div class="control-group">
        <label for="particleSize">💙 Size:</label>
        <input type="range" id="particleSize" min="1" max="10" value="3" />
      </div>
      <div class="control-group">
        <label for="speed">💜 Speed:</label>
        <input type="range" id="speed" min="0.1" max="5" step="0.1" value="1" />
      </div>
    </div>
  </div>
  <canvas id="canvas"></canvas>

  <!-- CRÉDITO -->
  <div class="credit">Hecho por <span>Edward-Night</span> ✨</div>

  <div style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            font-size: 48px; color: #60a5fa; z-index: 50; pointer-events: none; 
            font-family: 'Arial', sans-serif; text-shadow: 0 0 20px #3b82f6;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: bold;">
    💙 Te amo 💜
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    let w, h;
    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resize);
    resize();

    function heartShape(t) {
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y =
        13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
      return { x, y };
    }

    class Particle {
      constructor() {
        this.init();
      }
      init() {
        this.t = Math.random() * Math.PI * 2;
        const { x, y } = heartShape(this.t);
        this.x = w / 2 + x * 10;
        this.y = h / 2 - y * 10;
        this.size = parseFloat(particleSizeInput.value);
        this.speed = parseFloat(speedInput.value);
        this.angle = Math.random() * Math.PI * 2;
        this.velocity = Math.random() * 2 + 0.5;
        // Colores en tonos azules y morados
        const colors = ["#3b82f6", "#60a5fa", "#8b5cf6", "#a855f7", "#4f46e5", "#6366f1"];
        this.color = colors[Math.floor(Math.random() * colors.length)];
      }
      update() {
        this.x += Math.cos(this.angle) * this.velocity * this.speed;
        this.y += Math.sin(this.angle) * this.velocity * this.speed;
        if (
          this.x < 0 || this.x > w ||
          this.y < 0 || this.y > h
        ) this.init();
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
      }
    }

    const particleCountInput = document.getElementById("particleCount");
    const particleSizeInput = document.getElementById("particleSize");
    const speedInput = document.getElementById("speed");

    let particles = [];
    function createParticles() {
      particles = [];
      const count = parseInt(particleCountInput.value);
      for (let i = 0; i < count; i++) {
        particles.push(new Particle());
      }
    }
    createParticles();

    function animate() {
      ctx.fillStyle = "rgba(10, 15, 30, 0.15)";
      ctx.fillRect(0, 0, w, h);
      for (let p of particles) {
        p.update();
        p.draw();
      }
      requestAnimationFrame(animate);
    }
    animate();

    particleCountInput.addEventListener("input", createParticles);
    particleSizeInput.addEventListener("input", () => {
      for (let p of particles) p.size = parseFloat(particleSizeInput.value);
    });
    speedInput.addEventListener("input", () => {
      for (let p of particles) p.speed = parseFloat(speedInput.value);
    });

    const toggleBtn = document.getElementById("toggle-controls");
    const controls = document.getElementById("controls");
    toggleBtn.onclick = () => {
      controls.style.display = controls.style.display === "none" ? "block" : "none";
    };

    const fullscreenBtn = document.getElementById("toggle-fullscreen");
    fullscreenBtn.onclick = () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    };
  </script>
</body>
</html>
